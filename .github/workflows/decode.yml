name: decode-og
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  decode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/patch_index.py index.html
      - run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add index.html
          git commit -m "Remove photo upload restrictions" || exit 0
          git push
