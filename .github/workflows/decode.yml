name: decode-og
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  decode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: curl -sL "https://script.google.com/macros/s/AKfycbz-06us5XpkpPtmqSFmkwDvV1tnh68slpDkQ7SLPA2UZjKIS_emSmp3VHEIAI3yfV9f/exec?og=1" -o og.b64
      - run: base64 -d og.b64 > og.jpg && rm og.b64
      - run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add og.jpg
          git rm -f --ignore-unmatch og.jpg.b64
          git commit -m "Add og.jpg" || exit 0
          git push
